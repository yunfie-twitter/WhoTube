<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オフライン - WhoTube</title>
  <style>
    body {
      background-color: #0f0f0f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    h1 { font-size: 2rem; margin-bottom: 1rem; }
    p { color: #aaaaaa; margin-bottom: 2rem; }
    button {
      background-color: #ffffff;
      color: #000000;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>オフラインです</h1>
  <p>インターネット接続を確認してください。<br>キャッシュされている動画は再生できる場合があります。</p>
  <button onclick="window.location.reload()">再読み込み</button>
</body>
</html>
