services:
  whotube:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - COMPANION_BASE_URL=http://invidious-companion:8282/companion
      - DATABASE_URL=${DATABASE_URL}
      - VALKEY_URL=${VALKEY_URL}
      - BGUTIL_URL=${BGUTIL_URL}
      - MEDIA_PROXY_URL=${MEDIA_PROXY_URL}
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env:ro
    networks:
      - backend

  invidious-companion:
    build:
      context: ./invidious-companion
      dockerfile: Dockerfile
    environment:
      - SERVER_SECRET_KEY=whotubesecret123
    restart: unless-stopped
    cap_drop:
      - ALL
    read_only: true
    user: 10001:10001
    volumes:
      - /var/tmp/youtubei.js:/var/tmp/youtubei.js:rw
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  bgutil-pot-provider:
    build:
      context: ./bgutil-ytdlp-pot-provider/server
      dockerfile: Dockerfile
      target: server_node
    restart: unless-stopped
    networks:
      - backend

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=whotube
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=whotube
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - backend

  valkey:
    image: valkey/valkey:7-alpine
    restart: unless-stopped
    networks:
      - backend

  media-proxy-rs:
    image: ghcr.io/yojo-art/media-proxy-rs:main
    restart: unless-stopped
    networks:
      - backend

  anubis:
    image: ghcr.io/techarohq/anubis:latest
    environment:
      - TARGET=http://whotube:3000
      - BIND=:8923
      - COOKIE_KEY=${ANUBIS_COOKIE_KEY}
      - POLICY_FNAME=/app/botPolicies.yaml
      - CUSTOM_REAL_IP_HEADER=X-Forwarded-For
    volumes:
      - ./config/anubis/botPolicies.yaml:/app/botPolicies.yaml:ro
    restart: unless-stopped
    depends_on:
      - whotube
    networks:
      - backend

  nginx:
    image: nginx:mainline-alpine
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/certs:/etc/nginx/certs
      - nginx_cache:/var/cache/nginx
    entrypoint: /bin/sh -c "apk add --no-cache openssl && mkdir -p /etc/nginx/certs && [ ! -f /etc/nginx/certs/key.pem ] && openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/certs/key.pem -out /etc/nginx/certs/cert.pem -subj '/CN=localhost' || true && nginx -g 'daemon off;'"
    restart: unless-stopped
    depends_on:
      - whotube
      - anubis
    networks:
      - frontend
      - backend

networks:
  frontend:
  backend:

volumes:
  nginx_cache:
